services:

  oracle:
    image: container-registry.oracle.com/database/express:21.3.0-xe
    environment:
      ORACLE_PWD: ${ORACLE_PWD:-OraclePass1}
    ports:
      - "1521:1521"
    volumes:
      - oracle_data:/opt/oracle/oradata
      - ./docker/oracle/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "/opt/oracle/checkDBStatus.sh"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 180s

  fhir-server:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      # Optional: increase Tomcat heap
      - JAVA_OPTS=-Xms512m -Xmx2048m
    volumes:
      # External config files override the ones bundled in the WAR
      - ./docker/config:/config:ro
      # IG package (.tgz) files — referenced by packageUrl: file:///data/ig/... in application.yaml
      - ./docker/ig:/data/ig:ro
    depends_on:
      oracle:
        condition: service_healthy

volumes:
  oracle_data:
